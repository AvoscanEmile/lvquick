name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Standard Unit & Property Tests
  test:
    name: Unit & Property Tests
    runs-on: ubuntu-latest
    env:
      PROPTEST_CASES: 10000
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Cargo Test
        run: cargo test --verbose

  # 2. Formal Verification with Kani
  verification:
    name: Kani Formal Proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify with Kani
        uses: model-checking/kani-github-action@v1
        with:
          args: "--tests"

  # 3. Fuzzing Smoke Test
  fuzz:
    name: Fuzz Smoke Test (100s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nightly Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run Fuzzer
        run: cargo +nightly fuzz run full_pipeline -- -max_total_time=60
